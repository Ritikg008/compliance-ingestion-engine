services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    container_name: compliance_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    deploy:
      resources:
        limits:
          memory: 1g
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: compliance_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          memory: 3g
    restart: unless-stopped
    volumes:
      - ./data:/app/data

volumes:
  qdrant_storage: